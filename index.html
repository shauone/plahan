O.tagTextHistory.push(["<b class='base2'>8/15：日本宣告投降</b><br>日本昭和天皇透過廣播發表《終戰詔書》，正式向同盟國宣布無條件投降。台灣人也是在當天透過收音機（玉音放送）得知戰爭結束。<br><br><b class='base2'>9/2：正式簽署投降書</b><br> 日本代表在停泊於東京灣的美國密蘇里號戰艦上，正式簽署《降伏文書》，二戰在法理上正式結束。<br><br><b class='base2'>10/25：台灣受降日</b>國民政府設立的「台灣省行政長官公署」行政長官陳儀，奉盟軍統帥麥克阿瑟的命令，代表同盟國及蔣中正，在台北公會堂（今台北中山堂）接受台灣總督兼第十方面軍司令官安藤利吉的投降。這一天也是後來大家熟知的「台灣光復節」。</br></br><b class='base2'>備註：威權統治時期</b></br>根據促進轉型正義條例定義，威權統治時期指1945~1992。</br></br>"])

//<7-1947>❀
O.tagTextHistory.push(["<b class='base2'>2/27：台北緝菸血案</b><br> 灣省專賣局局員與警察在台北市大稻埕（天馬茶房前）查緝私菸，毆打寡婦販商林江邁，並開槍誤殺旁觀市民陳文溪。<br><br><b class='base2'>2/28：全台蜂起與請願</b> <br>群眾前往專賣局與台灣省行政長官公署（今行政院）抗議請願，遭公署衛兵開槍射擊，造成多人死傷。<br><br><b class='base2'>3/2：攻佔軍械庫與推舉謝雪紅</b><br>台北血案消息傳到台中，市民群起抗議。由謝雪紅、楊克煌等人召開市民大會，憤怒的青年學生與市民包圍警察局、攻佔軍械庫並奪取武器，正式掌握台中的實質控制權。<br><br><b class='base2'>3/3：高雄跨校自衛隊成立</b><br>二二八消息傳到高雄，市區陷入混亂。雄中學生在禮堂集結，由學生李榮河、陳仁悲擔任正副隊長成立自衛隊，隨後高雄工業、高雄商業、高雄女中的學生也陸續加入。他們打開軍械庫取出日治時期的軍訓步槍維持治安，並在校內設立「民眾保護所」，保護了數百名生命受威脅的外省籍教師與官員。<br><br><b class='base2'>3/5：高雄車站攻防戰</b><br>高雄要塞司令彭孟緝派出軍隊與憲兵封鎖高雄火車站，切斷全高屏地區的糧食與物資運輸。為了搶回車站、恢復民生物資供應，雄中自衛隊大膽對火車站發動反攻，但因武器落差太大，遭到軍方優勢火力擊退。<br><br><b class='base2'>3/6：二七部隊成立</b> <br>為了整合雜亂的民兵，各校學生與社會青年在台中干城營區集結，因紀念「2月27日」台北緝菸血案，正式定名為「二七部隊」。部隊接管了台中的治安，在隨後的十天內，台中市區治安高度良好，沒有發生濫殺。<br><br><b class='base2'>3/6：高雄三六屠殺</b> <br>彭孟緝下令發動全面軍事鎮壓，高雄市區爆發嚴重的「三六屠殺」。當晚自衛隊得知國軍大軍即將進攻，自知無力對抗，為了保護學生生命而宣布解散。隨後，國軍仍以迫擊砲、要塞砲猛烈轟炸雄中校園，至今雄中紅樓的紅磚牆上還留有當年的斑駁彈痕。<br><br><b class='base2'>3/8：國軍抵台與綏靖鎮壓</b> <br>行政長官陳儀表面與處理委員會協商，暗中向蔣中正請兵。國民革命軍第二十一師在基隆與高雄港登陸，展開全台大掃蕩（綏靖與清鄉）。 <br> <br><b class='base2'>3/16：烏牛欄之役與二七部隊解散</b> <br>面對國軍二十一師的優勢兵力逼近，二七部隊為了避免在台中市區引發巷戰波及無辜市民，主動將戰線轉移至南投埔里山區。雙方在烏牛欄吊橋（今南投埔里）爆發激烈槍戰，二七部隊最後因彈盡援絕，於當日傍晚宣布解散。</br></br>"])

O.tagTextHistory.push(["<b class='base2'>5/20：蔣中正就任總統</b><br> 於南京就職。<br><br><b class='base2'>5/10：動員戡亂時期臨時條款</b><br> 國民政府在國共內戰全面爆發的背景下，由國民大會制定《動員戡亂時期臨時條款》，並由蔣中正總統公布實施。隔年（1949年）政府遷台後，這部條款便在台灣繼續實施。它是威權時代的最高「太上憲法」。它凍結了《中華民國憲法》中保障人民權利與限制總統權力的條文。透過這部條款，總統不僅獲得了緊急處分的無限權力，還可以無限期連任；同時，國會代表（第一屆國代與立委）也因此不必改選，形成了在台長達40多年的「萬年國會」，全面奠定了戰後台灣的威權體制。"])

O.tagTextHistory.push(["<b class='base2'>5/19：頒布台灣省戒嚴令</b><br> 台灣省政府主席陳誠頒布戒嚴令，並於5月20日正式實施。同年12月國民政府因內戰全面撤退來台，開啟了台灣史稱「白色恐怖」的漫長年代，人民的言論、集會、結社、出版自由全部被剝奪。政府利用《懲治叛亂條例》和《檢肅匪諜條例》，以國家安全為名，逮捕、審判甚至處決了成千上萬的政治異議人士、知識份子與無辜民眾。<br><br><b class='base2'>12/7：頒布台灣省戒嚴令</b><br> 行政院召開緊急會議，正式決議「中央政府遷設台北」。<br><br><b class='base2'>12/10：蔣中正抵達台灣</b><br>蔣中正搭乘飛機從成都飛抵台北松山機場，象徵中華民國政府核心正式全面撤退至台灣。"])

O.tagTextHistory.push(["<b class='base2'>10/25：中華民國退出聯合國</b><br>沙烏地阿拉伯提案遭否決（美方大勢已去）事發經過： 聯合國大會當天針對「中國代表權問題」展開激烈辯論。美國與其盟友為了保住中華民國的席次，極力推動「雙重代表權」或「重要問題提案」（主張驅逐中華民國需要三分之二的多數決）。然而，沙烏地阿拉伯提出的延期審議修正案首先遭到大會否決，美方隨後提出的重要問題提案也未通過，象徵支持中華民國的陣營大勢已去。在得知美國的程序攻防全部失敗，即將進行由阿爾巴尼亞等國提出的「承認中華人民共和國為中國在聯合國唯一合法代表」表決前，時任中華民國外交部部長周書楷毅然走上發言台。周書楷當場發表嚴正聲明，痛斥聯合國大會違反憲章，並宣布中華民國主動退出其所參與創立的聯合國。隨後，周書楷率領全體中華民國代表團團員，在表決前全數起立，集體步出聯合國大會會場。 中華民國代表團離場後，聯合國大會隨即對「阿爾巴尼亞提案」進行正式表決，最終以 76 票贊成、35 票反對、17 票棄權，正式通過了震撼歷史的《聯合國大會第2758號決議》。該決議文決定「恢復中華人民共和國的一切權利」，並將蔣介石的代表從它在聯合國組織及其所屬一切機構中所非法佔據的席位上「驅逐出去」。台灣自此失去聯合國席位，並在隨後幾年內引發了與美國（1979年）等核心盟邦的斷交潮，全面進入艱困的外交孤立時期。"])

//<7-1977>❀
O.tagTextHistory.push(["<b class='base2'>11/19：中壢國小舞弊疑雲</b><br> 1977年台灣舉行五項地方公職選舉，其中桃園縣長選舉競爭最烈。原國民黨籍的許信良違紀脫黨參選，對抗國民黨提名的歐憲瑜。投票日中午，中壢市中壢國小第213號投開票所監選主任（中壢國小校長）被目擊在協助兩名高齡投票者時，涉嫌用沾有印泥的手指塗抹許信良的選票，企圖將其變為廢票。現場民眾發現後高呼「作票」，群眾隨即群情激憤。當晚至深夜，由於警方將涉嫌舞弊的監選主任帶回中壢分局保護，並意圖將抗議的證人扣留，引發上萬名憤怒的桃園中壢市民自發性包圍中壢分局抗議。警方多次施放催淚瓦斯驅散未果，深夜時，不滿的群眾開始推翻並放火焚燒警察局前的警車與公務車，最後甚至衝入分局縱火，現場火光衝天。這是戒嚴三十年來，台灣民間第一次有如此大規模的砸警局、燒車抗議行動。<br><br><b class='base2'>11/20：軍隊進駐與許信良高票當選。</b><br>為了平息暴動，政府緊急調派憲兵、憲特與軍隊進駐中壢維持秩序，並切斷當地對外的電話通訊。在對峙過程中，有兩名青年（江文國、張治平）不幸遭到警方開槍擊斃或重傷。歷史影響： 由於群眾展現了強大的反彈意志，國民黨當局擔心作票會引發全台連鎖性暴動，隨後的開票過程被嚴格監督，許信良最終以22萬的高票擊敗國民黨候選人，當選桃園縣長。"])
//❂
//<7-1978>❀
O.tagTextHistory.push(["<b class='base2'>5/20：蔣經國就任總統</b><br> 嚴家淦任屆期滿。<br><br><b class='base2'>12/16：美國宣布斷交</b><br> 美國駐華大使安克志奉命緊急求見中華民國總統蔣經國，告知美國即將在7個小時後（當日上午10點），由總統卡特同步與北京、華盛頓宣布「美中將於1979年1月1日正式建交，並與台灣斷交」。蔣經國隨即召開緊急會議，於清晨發表電視談話，痛斥美國政府背信忘義。消息傳出後，全台引發巨大的反美抗議浪潮，大批群眾前往美國大使館丟擲雞蛋，美國副國務卿克里斯多福隨後來台協商時，座車更在台北街頭遭到憤怒群眾包圍阻攔。"])
//❂
//<7-1979>❀
O.tagTextHistory.push(["<b class='base2'>1/1：中美正式斷交與廢除條約</b><br>1979年1月1日當天，台美兩國正式終止外交關係。美國政府承認中華人民共和國是「中國的唯一合法政府」，隨後關閉美國駐台北大使館，改設民間性質的「美國在台協會」（AIT）；中華民國駐美大使館也降旗關閉，改設「北美事務協調委員會」（現已更名為台灣美國事務委員會）。隨著斷交，美國同時宣布終止簽署於1954年的《中美共同防禦條約》，駐台美軍（美軍協防台灣司令部）在隨後的一年內分批全面撤離台灣，結束了美軍在台20多年的協防歷史。<br><br><b class='base2'>4/10：台灣關係法簽署</b><br>台美斷交後，美國國會因不滿卡特總統對台灣的外交背叛，主導起草了國內法。1979年3月底，美國國會高票通過《台灣關係法》，並追溯自1979年1月1日生效。卡特總統於4月10日正式簽署。該法以國內法形式，規定美國與台灣之間維持非官方的文化、經濟與商務關係。防衛武器提供：條文明定美國將「提供防禦性武器給台灣」，並視任何企圖以非和平方式決定台灣前途的舉動為「對西太平洋地區和平與安全的嚴重威脅」，這部法律自此成為往後數十年台美安全與防衛合作最重要的法律基石。<br><br><b class='base2'>12/10：美麗島事件</b><br>1970年代台灣「黨外」運動（即反對國民黨一黨專政的勢力）蓬勃發展，並創辦了《美麗島》雜誌社。1979年12月10日「國際人權日」，雜誌社成員在高雄市組織群眾進行火炬遊行，訴求解除戒嚴與開放民主。當晚，威權政府派出大量鎮暴警察、憲兵與裝甲車將群眾重重包圍，雙方在街頭爆發激烈的推擠與流血衝突。<br><br><b class='base2'>12/13：全台大逮捕</b><br>衝突過後僅三天，治安當局發動全台大搜捕。幾乎所有《美麗島》雜誌社的核心成員與核心支持者（包括黃信介、施明德、呂秀蓮、陳菊、姚嘉文、林義雄等）都在清晨遭到逮捕。白色恐怖蔓延：在隨後的偵訊中，許多人在調查局與警備總部遭到連續幾天幾夜不給睡覺、毆打、精神折磨等嚴酷刑求，被迫簽下官方擬定好的「自白書」，承認自己意圖「顛覆政府」"])

O.tagTextHistory.push(["<b class='base2'>2：美麗島事件公開軍事審判</b><br>政府隨後將核心的「美麗島八度」（施明德等8人）送上軍事法庭，以叛亂罪起訴。當時在美國等國際輿論的巨大壓力下，蔣經國政府破天荒同意開放媒體全程公開審判過程，並允許報紙逐字刊登被告的法庭辯詞。<br><br><b class='base2'>2/20：林義雄遭起訴</b><br>身為美麗島事件核心人物的台灣省議員林義雄，在遭到逮捕、遭到情治單位嚴酷刑求後，於2月20日被依「叛亂罪」正式起訴。<br><br><b class='base2'>2/28：台北林宅滅門慘案</b><br>2月28日中午，正值軍事法庭開庭偵訊美麗島案。兇手潛入台北市信義路二段的林義雄住家，持刀瘋狂行刺。林義雄60歲的母親林游阿妹被砍死在地下室樓梯旁；7歲的雙胞胎女兒林亮均、林婷均各被從背後一刀刺穿心臟當場死亡；長女林奐均雖身中六刀、肺部受重創，但經搶救後奇蹟般生還。"])

O.tagTextHistory.push(["<b class='base2'>7/2：陳文成教授命案</b><br>陳文成是美國卡內基美隆大學的統計學助理教授，因支持台灣民主運動並捐款給《美麗島雜誌》，在回台探親時被三名警備總部人員從家中帶走，進行長達數小時的徹夜訊問，主要追查他在海外支持台灣民主與台獨活動的資金往來。<br><br><b class='base2'>7/3：陳屍台大校園</b><br>清晨，陳文成的屍體在台灣大學研究生圖書館（今台大圖書資訊學系系館）旁的草地上被發現，身上有多處重創與骨折。官方當時迅速定調為「畏罪自殺」，但家屬與美國法醫驗屍後，皆指出屍體有明顯遭毆打與從高處被拋下的「他殺」痕跡。歷史影響： 此案震驚美國政壇，美國國會隨後召開聽證會，痛斥國民黨在美國校園佈建「校園特務」監控留學生的惡行，逼迫蔣經國政府承諾不再拒發海外異議人士的返台簽證，此案至今仍是著名的政治懸案。"])

O.tagTextHistory.push(["<b class='base2'>3/12：《自由時代周刊》創辦</b><br>鄭南榕在戒嚴時期創辦了《自由時代周刊》，並自任總編輯。他大膽採取「爭取百分之百言論自由」為宗旨，登記了多達58張雜誌執照（當時稱為「備胎執照」）。當某一期的雜誌遭到威權政府查禁、停刊，他隔週就立刻換上另一張執照繼續出版。<br><br><b class='base2'>10/15：江南案</b><br>「江南」是美籍華人作家劉宜良的筆名。他在美國撰寫了《蔣經國傳》，內容揭露了許多蔣家的宮廷內幕與蔣經國的早年辛酸，引發國民黨高層強烈不滿。劉宜良在美國加州舊金山德里市的自家住宅車庫內，遭到兩名男子近距離開槍射殺，當場身亡。1984年11月（台美情報風暴與大逮捕）： 美國聯邦調查局（FBI）迅速破案，證實兇手是台灣黑幫「竹聯幫」老大陳啟禮與董桂森。更驚人的是，陳啟禮供出這是奉中華民國國防部情報局局長汪希苓的密令「制裁」刺殺。為了滅口，台灣政府隨後發動「一清專案」逮捕陳啟禮，但陳啟禮早已在海外留下自保錄音帶，揭穿真相。國民黨派特務到美國領土刺殺美國公民，徹底激怒了美國政府。這場風暴迫使蔣經國不得不將情報局長汪希苓判刑，並公開宣布「蔣家人未來不會，也不能競選下一任總統」，直接終結了蔣家第三代（如蔣孝武）的接班可能，加速了台灣的民主化。"])

O.tagTextHistory.push(["<b class='base2'>9/28：民主進步黨成立</b><br>隨著「黨外運動」在1970至1980年代的累積，反對派仕紳與青年律師在台北市圓山大飯店秘密集會。在台灣尚未解除戒嚴、隨時有被逮捕風險的紧繃氛圍下，由費希平、謝長廷、尤清等人領銜，破天荒宣布成立「民主進步黨」（民進黨）。歷史影響： 這是台灣戰後第一個本土反對黨。當時蔣經國總統在國內外強大壓力下，最終選擇「冷處理」，公開宣布「時代在變，環境在變，潮流也在變」，並未採取逮捕鎮壓。民進黨的成立直接衝撞了威權體制的底線，迫使國民黨政府在隔年（1987年7月15日）宣布解除戒嚴。"])

O.tagTextHistory.push(["<b class='base2'>1/13：李登輝就任總統</b><br>蔣經國因糖尿病引發多重器官衰竭於台北逝世。<br><br><b class='base2'>5/20：農民抗議</b><br>由林國華、蕭裕珍等人擔任總指揮，集結了來自雲林、彰化、南投、嘉義等地的數千名農民，北上前往台北市（國父紀念館集結）進行請願，當時提出的「七大訴求」。遊行隊伍原本預計前往立法院遞交請願書。然而在下午，現場因種種因素（如借用立法院廁所受阻、警方封鎖線推擠等）導致情緒失控。隨後，部分群眾拆下了立法院的招牌，引發了警方動用噴水車與強力鎮壓。<br><br><b class='base2'>5/21：清晨</b><br>劇烈衝突：街頭出現嚴重的石塊、棍棒與警方警棍、鎮壓水車的對抗，導致大量農民、聲援大學生、記者以及憲警人員受傷。大規模逮捕： 警方最終逮捕了超過百人。後續檢方以《刑法》妨害公務、聚眾施暴等罪名，起訴了包括總指揮林國華、多位農運幹部、甚至聲援的台大學生與憲政觀察人員。"])

O.tagTextHistory.push(["<b class='base2'>1988/12/10：鄭南榕刊登台灣共和國憲法草案</b><br>鄭南榕在《自由時代周刊》第254期上，完整刊登了由旅美學者許世楷所撰寫的《台灣共和國憲法草案》。歷史轉折： 儘管台灣當時已於1987年解嚴，但高層威權結構並未完全改變。<br><br><b class='base2'>1：誓死抵抗</b><br>高等法院檢察處向鄭南榕發出「涉嫌叛亂罪」的傳票。鄭南榕認為「台灣獨立」屬於言論自由的範疇，國家無權定罪，因此公開宣布：「國民黨不能逮捕到我，只能逮捕到我的屍體。」隨後他將自己反鎖在雜誌社辦公室內，並預備了汽油與打火機，展開長達71天的誓死抵抗。<br><br><b class='base2'>4/7：拒捕自焚與殉道</b><br>清晨，台北市警察局局長下令派出大批鎮暴警察與霹靂小組，強力破門攻入位於台北市民權東路的雜誌社進行拘提。在警方破門強攻的關鍵時刻，鄭南榕毅然在總編輯室內點燃汽油自焚，壯烈犧牲，享年42歲。歷史深遠影響：催生刑法100條修正：鄭南榕的死引發社會巨大的悲憤與震撼，直接激化了後來的民主運動。在強大民意壓力下，立法院最終於1992年廢除了《懲治叛亂條例》，並修正了《刑法》第100條，讓台灣人從此不再因為發表政治言論、主張台獨或反對政府而遭到叛亂罪起訴。訂定言論自由日：中華民國政府於2016年正式將鄭南榕自焚的4月7日定為國家級的「言論自由日」，用以紀念他為台灣自由所做的重大犧牲。"])

O.tagTextHistory.push(["<b class='base2'>3/16：野百合學運</b><br>為了抗議國民黨控制的「國民大會」（萬年代表）自我擴權、自行加薪，幾名台大學生到中正紀念堂廣場靜坐抗議，隨後引發全台數千名大學生集結響應，並以台灣特有種「野百合」作為追求自主、純潔與生命力強韌的運動精神象徵。<br><br><b class='base2'>3/21：李登輝接見學生</b><br>剛當選中華民國第八任總統的李登輝，破天荒在總統府接見了學運學生代表，並當場允諾學生提出的四大政治訴求，包括召開國事會議、廢除《動員戡亂時期臨時條款》、以及廢除萬年國會。這場學運以和平落幕，但它給了李登輝極大的民意籌碼去對抗國民黨內的保守派勢力。1991年底，在台長達40多年、從未改選過的萬年民代（俗稱萬年國會）正式全面退職，台灣正式迎來1992年的國會全面改選，以及1996年的首次總統直選。"])

O.tagTextHistory.push(["<b class='base2'>5/1：廢止動員戡亂時期臨時條款</b><br>1990年野百合學運爆發後，學生提出終止臨時條款的政治訴求。李登輝總統順應民意，於1991年4月召開國民大會完成憲法增修，並於4月30日正式簽署總統令，公告自1991年5月1日起廢止《動員戡亂時期臨時條款》，終止動員戡亂時期。這象徵著台灣法理威權統治的徹底終結。政府不再將中國共產黨定調為法理上的「叛亂團體」，兩岸關係進入新階段；更重要的是，憲法正式恢復全面運作，直接促成了1991年底「萬年國會」老代表全面退職，台灣正式迎來1992年國會全面改選與民主新紀元。"])

O.tagTextHistory.push(["<b class='base2'>5/15：刑法100條修正案</b><br> 舊法規定「意圖顛覆政府、思想造反」即可處死刑或無期徒刑，是白色恐怖禁錮言論自由的最強法源。鄭南榕自焚、一○○行動聯盟抗爭後，立法院廢除「思想叛亂罪」，明定必須有「強暴或脅迫」的實際行動才構成叛亂。台灣人自此獲得百分之百的思想與言論自由。<br><br><b class='base2'>12/19：二屆立法委員選舉</b><br> 這是台灣歷史上第一次「全額」由台灣人民自主投票選出的立法委員選舉。這場選舉總共改選161個席次（包含區域、不分區與僑選），朝野各黨派展開了極其激烈的政黨大對決。選舉結果：中國國民黨：獲得 95 席（得票率 53%），雖然維持國會過半多數，但席次大幅縮水，內部也正式分裂為主流派與非主流派（後來的「新黨」前身）。民主進步黨：在黃信介「東征」花蓮等基層開拓下，一舉斬獲 51 席（得票率 31%），成功突破「三分之一」的修憲與重大法案牽制門檻，在國會奠定了強大的反對黨地位。"])

O.tagTextHistory.push(["<b class='base2'>3/23：二二八事件處理及補償條例</b><br>這是台灣政府歷史上第一部正式針對威權時代「二二八事件」進行官方平反、調查與賠償的專法（後於1997年修正為「賠償」條例）。依法成立了「二二八事件紀念基金會」，開始受理受難者家屬的賠償申請、恢復名譽，並促成了國家級二二八紀念館的設立。"])

O.tagTextHistory.push(["<b class='base2'>5/28：戒嚴時期不當叛亂暨匪諜審判案件補償條例</b><br>專門針對二二八事件之後（1949年－1987年戒嚴期間），因白色恐怖、懲治叛亂條例、檢肅匪諜條例而遭到軍事法庭冤判、監禁或處決的無辜民眾進行補償。實質影響： 成立了「白恐補償基金會」，發放數百億補償金，是撫平白色恐怖政治受難者傷痛的重要法源。"])

O.tagTextHistory.push(["<b class='base2'>12/15：國家檔案法</b><br> 威權時代情治單位（如警總、國安局、調查局）留下了海量的秘密監聽、告密與審判檔案，過去一直被政府以國家安全為由列為極機密。該法通過後，政府成立了「國家發展委員會檔案管理局」，強制要求各部會清查並移交歷史檔案，成為後來轉型正義「開放政治檔案」、「尋找加害者與受害者真相」的法理基石。"])

O.tagTextHistory.push(["<b class='base2'>5/20：蔡英文當選總統</b><br>副總統：蘇嘉全、陳建仁<br><br><b class='base2'>7/15：政黨及其附隨組織不當取得財產處理條例</b><br>簡稱《不當黨產條例》。威權時代國民黨「黨政不分」、「以黨領政」，將許多國家土地、國庫財產轉化為私人黨產，造成戰後政黨競爭的不公平。行政院依法設立「不當黨產處理委員會」（黨產會），全面調查、凍結並向國民黨追討在威權時期（1945年8月15日起）以不當手段取得的財產，將其收歸國有。"])

O.tagTextHistory.push(["<b class='base2'>2018/8/24：東廠事件</b><br>時任促轉會副主委兼發言人的張天欽，在副主委辦公室召集內部官員開會。當時正值2018年底地方縣市長大選期間，張天欽在會議中點名國民黨籍新北市長候選人侯友宜（因侯友宜在威權時期擔任警官，曾負責拘提鄭南榕）是「轉型正義最惡劣的例子」，並意圖推動《除垢法》（人事清查制度）來針對侯友宜。張天欽更在會中自嘲調侃：「我們本來是南廠，現在變西廠，後來升格變東廠。」<br><br><b class='base2'>2018/8/24：監察院全票通過彈劾張天欽</b><br>當時參與該場會議的促轉會副研究員吳佩蓉，因不滿內部開會流於政黨惡鬥、偏離行政中立，暗中錄音並將錄音檔及秘密會議紀錄提供給《鏡週刊》。 歷經一年的調查，監察院於2019年10月1日召開審查會，以 12比0 的全票通過彈劾張天欽。"])
