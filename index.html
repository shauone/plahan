<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>GitHub 讀取特定儲存格</title>
</head>
<body>

    <h1>指定儲存格執行結果：</h1>
    <div id="result" style="font-size: 24px; color: blue;">正在載入資料...</div>

 <script>
    // 1. 你的 Google 試算表 CSV 網址
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQBaBParGcI19sZLDdbP1cnl_Iv-IvA6b33XX3jFTJTSLDFvTumTyNPp-Z0b9zrQDGONRtDyxeuv21n/pub?output=csv';

    // 2. 你想指定的試算表位置（例如：B5 儲存格，記得減 1）
    const targetRow = 5 - 1; // 第 5 列
    const targetCol = 2 - 1; // B 欄 (第 2 欄)

    // 🛠️ 專業 CSV 解碼器：自動處理 Google 發布造成的引號、逗號地獄
    function parseCSVLine(text) {
        let p = '', c = '', r = [];
        let q = false;
        for (let i = 0; i < text.length; i++) {
            c = text[i];
            if (c === '"') {
                if (q && text[i+1] === '"') { r[r.length-1] += '"'; i++; }
                else { q = !q; }
            } else if (c === ',' && !q) { r.push(''); }
            else if (c === '\r' || c === '\n') { if (!q) break; else r[r.length-1] += c; }
            else {
                if (r.length === 0) r.push('');
                r[r.length-1] += c;
            }
        }
        return r;
    }

    function runScriptFromSheet() {
        // ✨ 動態加上時間戳記（?t=...），徹底解決瀏覽器死記舊資料的麻煩
        const cleanUrl = csvUrl + '&t=' + new Date().getTime();

        fetch(cleanUrl)
            .then(response => response.text()) 
            .then(csvText => {
                const allLines = csvText.split('\n'); 
                const googleSheetTable = [];

                for (let i = 0; i < allLines.length; i++) {
                    if (allLines[i].trim() !== '') {
                        googleSheetTable.push(parseCSVLine(allLines[i]));
                    }
                }

                // 撈出你指定的那一格
                let jsCodeString = googleSheetTable[targetRow][targetCol]; 
                jsCodeString = jsCodeString.trim();

                document.getElementById('result').innerText = jsCodeString;
                
                // 執行你在試算表裡寫的大量 JS 敘述
                eval(jsCodeString); 
            })
            .catch(error => {
                console.error('執行失敗:', error);
                document.getElementById('result').innerText = '抓取失敗，請確認試算表座標是否正確。';
            });
    }

    window.onload = runScriptFromSheet;
</script>

</body>
</html>
